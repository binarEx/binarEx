name: Generate GitHub Metrics

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

concurrency:
  group: metrics
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1) Checkout with full history
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Generate & COMMIT the SVG (metrics action commits to main)
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          user: binarEx
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Berlin
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 10
          plugin_habits: yes
          plugin_habits_from: 200
          token: ${{ secrets.METRICS_TOKEN }}  # omit if public-only

      # 3) Sync local workspace with the SVG commit pushed by metrics
      - name: Sync with remote after metrics commit
        run: |
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull --rebase origin ${{ github.ref_name }}

      # 4) Convert SVG -> PNG fallback
      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Rasterize SVG to PNG
        run: rsvg-convert -w 1200 github-metrics.svg -o github-metrics.png

      # 5) Commit only the PNG on top of the latest SVG commit
      - name: Commit PNG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics.png
          git commit -m "chore(metrics): add/update PNG fallback" || echo "No changes"
          git push --force-with-lease
